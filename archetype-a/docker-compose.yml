services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
      POSTGRES_DB: payments
    ports:
      - "5433:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d payments"]
      interval: 2s
      timeout: 5s
      retries: 15

  upstream-mock:
    image: archetype-a-upstream-mock:broken
    build:
      context: ./src/upstream-mock
    environment:
      DATABASE_URL: postgres://bench:bench@postgres:5432/payments?sslmode=disable
      COMMIT_LATENCY_MS: "2200"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 2s
      timeout: 5s
      retries: 15

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    command: ["-host", "0.0.0.0", "-config", "/config/toxiproxy.json"]
    volumes:
      - ./toxiproxy/toxiproxy.json:/config/toxiproxy.json:ro
    ports:
      - "8474:8474"
      - "8666:8666"
    depends_on:
      upstream-mock:
        condition: service_healthy

  gateway:
    image: archetype-a-gateway:broken
    build:
      context: ./src/gateway
    environment:
      UPSTREAM_URL: http://toxiproxy:8666/charge
      CLIENT_TIMEOUT_MS: "2000"
    ports:
      - "8080:8080"
    depends_on:
      toxiproxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 2s
      timeout: 5s
      retries: 15
