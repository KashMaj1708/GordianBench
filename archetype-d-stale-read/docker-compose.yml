services:
  postgres-primary:
    # Bitnami moved versioned Docker Hub tags to the `bitnamilegacy` namespace
    # in 2025; this is the pinned PostgreSQL 16 replication image.
    image: bitnamilegacy/postgresql:16
    environment:
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: repl
      POSTGRESQL_REPLICATION_PASSWORD: replpass
      POSTGRESQL_USERNAME: bench
      POSTGRESQL_PASSWORD: bench
      POSTGRESQL_DATABASE: ledger
      POSTGRESQL_POSTGRES_PASSWORD: adminpass
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d ledger"]
      interval: 3s
      timeout: 5s
      retries: 20

  # The standby reaches the primary's replication stream THROUGH toxiproxy, so a
  # 'down'/latency toxic on the "replication" proxy injects deterministic
  # partition/lag — the controllable cause of stale reads.
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    command: ["-host", "0.0.0.0", "-config", "/config/toxiproxy.json"]
    volumes:
      - ./toxiproxy/toxiproxy.json:/config/toxiproxy.json:ro
    ports:
      - "8474:8474"
    depends_on:
      postgres-primary:
        condition: service_healthy

  postgres-replica:
    image: bitnamilegacy/postgresql:16
    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_REPLICATION_USER: repl
      POSTGRESQL_REPLICATION_PASSWORD: replpass
      POSTGRESQL_MASTER_HOST: toxiproxy
      POSTGRESQL_MASTER_PORT_NUMBER: 5432
      POSTGRESQL_USERNAME: bench
      POSTGRESQL_PASSWORD: bench
      POSTGRESQL_DATABASE: ledger
      POSTGRESQL_POSTGRES_PASSWORD: adminpass
    ports:
      - "5436:5432"
    depends_on:
      postgres-primary:
        condition: service_healthy
      toxiproxy:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d ledger"]
      interval: 3s
      timeout: 5s
      retries: 30

  ledger-api:
    image: archetype-d-stale-read-ledger-api:broken
    build:
      context: ./src/ledger-api
    environment:
      PRIMARY_URL: postgres://bench:bench@postgres-primary:5432/ledger?sslmode=disable
      REPLICA_URL: postgres://bench:bench@postgres-replica:5432/ledger?sslmode=disable
      PIN_TTL_MS: "250"
    ports:
      - "8083:8080"
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 3s
      timeout: 5s
      retries: 20
