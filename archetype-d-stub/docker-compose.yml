services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
      POSTGRES_DB: ledger
    ports:
      - "5434:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d ledger"]
      interval: 2s
      timeout: 5s
      retries: 15

  ledger-api:
    image: archetype-d-stub-ledger-api:broken
    build:
      context: ./src/ledger-api
    environment:
      DATABASE_URL: postgres://bench:bench@postgres:5432/ledger?sslmode=disable
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 2s
      timeout: 5s
      retries: 15
